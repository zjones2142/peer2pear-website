<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="frameBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#424951"/>
      <stop offset="100%" stop-color="#2E333A"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Square rounded frame -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#frameBg)"/>
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80"
        fill="none" stroke="#9CB344" stroke-width="10"/>
  <rect x="34" y="34" width="444" height="444" rx="64" ry="64"
        fill="none" stroke="#9CB344" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- P2 monogram, left side -->
  <text x="140" y="325" font-size="280" font-weight="700" fill="#F5F7F2"
        text-anchor="middle" letter-spacing="-6">P</text>
  <text x="236" y="370" font-size="150" font-weight="600" fill="#9CB344"
        text-anchor="middle" letter-spacing="-3">2</text>

  <!-- Low-poly pear, right side -->
  <g transform="translate(280, 145) scale(0.85)" filter="url(#softShadow)">
    <!-- Stem -->
    <path d="M 118 28 Q 120 10 132 4 Q 138 8 132 22 Q 128 34 122 42 Z"
          fill="#5A4A2E"/>

    <!-- Leaf -->
    <path d="M 132 18 L 180 8 L 198 34 Z" fill="#B5C95A"/>
    <path d="M 132 18 L 198 34 L 172 52 Z" fill="#7A8F32"/>
    <path d="M 132 18 L 172 52 L 138 38 Z" fill="#9CB344"/>
    <path d="M 138 38 Q 165 28 195 18" stroke="#4A5820" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Pear body facets -->
    <path d="M 118 42 L 98 58 L 82 88 L 98 110 L 134 112 L 148 90 L 146 60 Z" fill="#B5C95A"/>
    <path d="M 82 88 L 60 120 L 52 160 L 80 170 L 98 140 L 98 110 Z" fill="#C9DB6D"/>
    <path d="M 52 160 L 40 205 L 56 250 L 84 250 L 90 210 L 80 170 Z" fill="#9CB344"/>
    <path d="M 56 250 L 70 295 L 110 320 L 130 300 L 110 260 L 84 250 Z" fill="#7A8F32"/>
    <path d="M 98 110 L 98 140 L 130 150 L 148 130 L 148 90 L 134 112 Z" fill="#9CB344"/>
    <path d="M 98 140 L 90 210 L 130 220 L 156 190 L 148 150 L 130 150 Z" fill="#A8C050"/>
    <path d="M 90 210 L 84 250 L 110 260 L 140 258 L 156 220 L 130 220 Z" fill="#8AA13A"/>
    <path d="M 110 260 L 130 300 L 170 310 L 182 280 L 160 250 L 140 258 Z" fill="#7A8F32"/>
    <path d="M 148 90 L 148 130 L 176 140 L 188 110 L 176 80 L 146 60 Z" fill="#8AA13A"/>
    <path d="M 148 130 L 156 190 L 196 200 L 210 160 L 188 110 L 176 140 Z" fill="#7A8F32"/>
    <path d="M 156 190 L 156 220 L 196 230 L 220 200 L 210 160 L 196 200 Z" fill="#6B7F2E"/>
    <path d="M 156 220 L 140 258 L 160 250 L 182 280 L 210 260 L 220 200 L 196 230 Z" fill="#5A6E22"/>
    <path d="M 130 300 L 170 310 L 200 295 L 210 260 L 182 280 L 170 310 Z" fill="#6B7F2E"/>
    <path d="M 110 320 L 130 300 L 170 310 L 160 328 L 130 332 Z" fill="#5A6E22"/>

    <!-- Specular highlight -->
    <path d="M 82 88 L 98 110 L 98 140 L 90 210 L 84 170 L 72 120 Z"
          fill="#FFFFFF" opacity="0.12"/>
  </g>
</svg>
